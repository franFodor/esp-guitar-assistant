<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Metronome</title>
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="metronome.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="container mt-4 mb-4">
        <h2 class="text-center">Metronome</h2>

        <div class="row justify-content-center mt-3">
            <div class="col-auto">
                <select id="timesig-dropdown" class="select-dark">
                    <option>2/4</option>
                    <option>3/4</option>
                    <option selected>4/4</option>
                    <option>6/8</option>
                </select>
            </div>
        </div>

        <div class="row justify-content-center mt-4">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-body text-center">
                        <div id="beat-dots" class="beat-dots mb-4"></div>

                        <div class="bpm-control mb-3">
                            <button id="bpm-down" class="btn btn-secondary bpm-btn">&#8722;</button>
                            <span id="bpm-display" class="bpm-display">120</span>
                            <button id="bpm-up" class="btn btn-secondary bpm-btn">+</button>
                        </div>

                        <input type="range" id="bpm-slider" class="bpm-slider mb-4"
                               min="40" max="240" value="120">

                        <div class="d-flex justify-content-center">
                            <button id="start-btn" class="btn btn-lg">Start</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="jquery.js"></script>
    <script src="popper.js"></script>
    <script src="bootstrap.js"></script>
    <script src="metronome.js"></script>
</body>
</html>
