    <div class="theme-toggle">
        <span class="theme-toggle-label" id="sound-icon" title="Toggle sounds"></span>
        <span class="theme-toggle-label" id="theme-icon"></span>
        <label class="theme-switch" title="Toggle light/dark theme">
            <input type="checkbox" id="theme-checkbox">
            <span class="theme-slider"></span>
        </label>
    </div>

<script>
if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
window.scrollTo(0, 0);
(function() {
    var SVG_SOUND_ON  = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>';
    var SVG_SOUND_OFF = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
    var soundIcon = document.getElementById('sound-icon');
    function applySound(enabled) {
        if (typeof soundsEnabled !== 'undefined') soundsEnabled = enabled;
        soundIcon.innerHTML = enabled ? SVG_SOUND_ON : SVG_SOUND_OFF;
        soundIcon.classList.toggle('muted', !enabled);
    }
    applySound(localStorage.getItem('sounds') !== 'false');
    soundIcon.addEventListener('click', function() {
        var enabled = !(typeof soundsEnabled !== 'undefined' ? soundsEnabled : true);
        localStorage.setItem('sounds', enabled ? 'true' : 'false');
        applySound(enabled);
    });

    var cb = document.getElementById('theme-checkbox');
    var icon = document.getElementById('theme-icon');
    var isLight = localStorage.getItem('theme') !== 'dark';
    var SVG_SUN  = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>';
    var SVG_MOON = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    function apply(light) {
        if (light) {
            document.body.classList.add('light-theme');
            cb.checked = true;
            icon.innerHTML = SVG_SUN;
        } else {
            document.body.classList.remove('light-theme');
            cb.checked = false;
            icon.innerHTML = SVG_MOON;
        }
    }
    apply(isLight);
    cb.addEventListener('change', function() {
        var light = cb.checked;
        localStorage.setItem('theme', light ? 'light' : 'dark');
        apply(light);
    });
})();
</script>
