<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Scale Practice</title>
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chord.css">
    <link rel="stylesheet" href="fretboard.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="container mt-5">
        <h2 class="text-center">Scale Practice</h2>

        <div class="row justify-content-center mt-3">
            <div class="col-auto">
                <select id="root-dropdown" class="select-dark"></select>
            </div>
            <div class="col-auto">
                <select id="scale-dropdown" class="select-dark" style="min-width:190px"></select>
            </div>
        </div>

        <div class="row justify-content-center mt-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4>Scale Notes</h4>
                    </div>
                    <div class="card-body chord-display">
                        <div id="scale-notes-badges" class="mb-3"></div>
                        <div id="detected-note-display" style="font-size:3rem; font-weight:bold; color:var(--fg);">--</div>
                        <div class="mt-3">
                            <button id="listen-btn" class="btn btn-lg">Start Listening</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <button id="btn-prev" class="btn btn-secondary">&#9664;</button>
            <span id="position-label" class="mx-3" style="font-size:1.1rem; color:var(--fg);">Frets 5 – 9</span>
            <button id="btn-next" class="btn btn-secondary">&#9654;</button>
        </div>

        <div id="fretboard-container" class="mt-3 row justify-content-center">
            <div id="fretboard"></div>
        </div>
    </div>

    <script src="jquery.js"></script>
    <script src="popper.js"></script>
    <script src="bootstrap.js"></script>
    <script src="scale.js"></script>
</body>
</html>
