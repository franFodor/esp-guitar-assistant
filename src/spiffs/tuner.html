<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Guitar Tuner</title>
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="tuner.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="container mt-4 mb-4">
        <h2 class="text-center">Guitar Tuner</h2>

        <div class="row justify-content-center mt-3">
            <div class="col-md-4">
                <select id="tuning-dropdown" class="select-dark"></select>
            </div>
        </div>

        <div class="row justify-content-center mt-3">
            <div class="col-md-6">
                <div id="tuning-display"></div>
            </div>
        </div>
        <div class="row justify-content-center mt-3">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4>Detection</h4>
                    </div>
                    <div class="card-body">
                        <div id="meter">
                            <div id="green-zone"></div>
                            <div id="needle"></div>
                            <div id="center-line"></div>
                        </div>
                        <div id="readout">
                            <div id="note">--</div>
                            <div id="cents">0 cents</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="jquery.js"></script>
    <script src="popper.js"></script>
    <script src="bootstrap.js"></script>
    <script src="tuner.js"></script>
    <script>
        $(document).ready(function() {
            fetch('nav.html')
                .then(response => response.text())
                .then(data => {
                    $('#navbar').html(data);
                    $('#nav-tuner').addClass('active').append('<span class="sr-only">(current)</span>');
                });
        });
    </script>
</body>
</html>
