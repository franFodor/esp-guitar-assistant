<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Guitar Tuner</title>
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="tuner.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="container mt-4">
        <h2 class="text-center">Guitar Tuner</h2>
        <div class="row justify-content-center">
            <div class="col-md-4">
                <select id="tuning-dropdown" class="form-select form-select-lg bg-dark text-light"></select>
            </div>
        </div>
        <div class="text-center mt-4">
            <div id="tuning-display"></div>
            <div id="meter">
                <div id="green-zone"></div>
                <div id="needle"></div>
                <div id="center-line"></div>
            </div>
            <div id="readout">
                <div id="note">--</div>
                <div id="freq">-- Hz</div>
                <div id="cents">0 cents</div>
            </div>
        </div>
    </div>

    
    <script src="jquery.js"></script>
    <script src="popper.js"></script>
    <script src="bootstrap.js"></script>
    <script src="tuner.js"></script>
    <script>
        $(document).ready(function() {
            fetch('nav.html')
                .then(response => response.text())
                .then(data => {
                    $('#navbar').html(data);
                    $('#nav-tuner').addClass('active').append('<span class="sr-only">(current)</span>');
                });
        });
    </script>
</body>
</html>
