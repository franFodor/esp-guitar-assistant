<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Chord Practice</title>
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="chord.css">
    <link rel="stylesheet" href="fretboard.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="container mt-4 mb-4">
        <h2 class="text-center">Chord Practice</h2>
        <div class="row justify-content-center">
            <div class="col-md-4">
                <select id="chord-dropdown" class="select-dark mb-3"></select>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4>Detected Chord</h4>
                    </div>
                    <div class="card-body">
                        <div id="chord-display" class="chord-display">
                            <div id="chord-name">--</div>
                            <div id="target-notes-display" style="margin-top: 10px;"></div>
                            <div id="detected-notes-display" style="margin-top: 5px;">-</div>
                            <div class="text-center mt-3">
                                <button id="listen-btn" class="btn btn-lg">Start Listening</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="fretboard-container" class="mt-3 d-flex flex-wrap justify-content-center" style="gap: 1rem;">
            <div id="fretboard"></div>
            <div id="chord-img-box">
                <img id="chord-img" alt="">
                <div id="chord-img-placeholder">
                    <div id="chord-img-name">A major</div>
                    <div style="font-size:0.85rem;">No image available</div>
                </div>
            </div>
        </div>
    </div>

    <script src="jquery.js"></script>
    <script src="popper.js"></script>
    <script src="bootstrap.js"></script>
    <script src="chords.js"></script>
    <script src="chord.js"></script>
</body>
</html>
