<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>ESP Guitar Assistant</title>
    <link rel="stylesheet" href="bootstrap.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <div id="navbar"></div>

    <div class="container mt-5">
        <div class="jumbotron text-center">
            <h1 class="display-4">ESP Guitar Assistant</h1>
            <p class="lead">Select a tool to get started</p>
        </div>

        <div class="row justify-content-center mt-5">
            <div class="col-md-4 mb-4">
                <a href="tuner.html" class="tool-card">
                    <div class="card h-100">
                        <div class="card-body">
                            <h3 class="card-title">Tuner</h3>
                            <p class="card-text">Tune your guitar</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-4 mb-4">
                <a href="scale.html" class="tool-card">
                    <div class="card h-100">
                        <div class="card-body">
                            <h3 class="card-title">Scales</h3>
                            <p class="card-text">Learn and practice guitar scales</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-4 mb-4">
                <a href="chord.html" class="tool-card">
                    <div class="card h-100">
                        <div class="card-body">
                            <h3 class="card-title">Chords</h3>
                            <p class="card-text">Practice chord recognition and fingering</p>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-4 mb-4">
                <a href="metronome.html" class="tool-card">
                    <div class="card h-100">
                        <div class="card-body">
                            <h3 class="card-title">Metronome</h3>
                            <p class="card-text">Keep time with adjustable BPM and time signature</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    
    <script src="jquery.js"></script>
    <script src="popper.js"></script>
    <script src="bootstrap.js"></script>
    <script>
        $(document).ready(function() {
            fetch('nav.html')
                .then(response => response.text())
                .then(data => {
                    $('#navbar').html(data);
                    $('#nav-home').addClass('active').append('<span class="sr-only">(current)</span>');
                });
        });
    </script>
</body>
</html>
